{% extends "base.html" %}
{% block title %}注册{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <h2>创建账号</h2>
        <p class="subtitle">加入我们，开始你的二手交易之旅</p>
        <form method="POST">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" name="username" class="form-control" placeholder="请输入用户名" required minlength="2" maxlength="30">
            </div>
            <div class="form-group">
                <label>邮箱</label>
                <input type="email" name="email" class="form-control" placeholder="请输入邮箱" required>
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" name="password" class="form-control" placeholder="至少6个字符" required minlength="6">
            </div>
            <button type="submit" class="btn btn-primary btn-block btn-lg">注册</button>
        </form>
        <div class="footer">
            已有账号？ <a href="{{ url_for('login') }}">立即登录</a>
        </div>
    </div>
</div>
{% endblock %}
