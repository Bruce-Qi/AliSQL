{% extends "base.html" %}
{% block title %}个人设置{% endblock %}

{% block content %}
<div class="container page-content">
    <div class="settings-card">
        <h2 class="section-title">个人设置</h2>
        <form method="POST" enctype="multipart/form-data">
            <div class="avatar-upload">
                <svg viewBox="0 0 24 24" width="80" height="80" fill="none" stroke="var(--gray-500)" stroke-width="1.5" style="border-radius:50%; border:2px solid var(--gray-300);">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
                </svg>
                <div>
                    <label class="btn btn-secondary" style="cursor:pointer;">
                        更换头像
                        <input type="file" name="avatar" accept="image/*" style="display:none">
                    </label>
                    <p style="font-size:12px; color:var(--gray-500); margin-top:4px;">支持 JPG、PNG、GIF，最大 16MB</p>
                </div>
            </div>

            <div class="form-group">
                <label>个人简介</label>
                <textarea name="bio" class="form-control" placeholder="介绍一下自己吧" rows="3">{{ current_user.bio }}</textarea>
            </div>

            <div class="form-group">
                <label>所在地</label>
                <input type="text" name="location" class="form-control" placeholder="如：北京市" value="{{ current_user.location }}">
            </div>

            <button type="submit" class="btn btn-primary btn-block btn-lg">保存设置</button>
        </form>
    </div>
</div>
{% endblock %}
