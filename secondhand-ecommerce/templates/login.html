{% extends "base.html" %}
{% block title %}登录{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <h2>欢迎回来</h2>
        <p class="subtitle">登录你的账号，发现更多好物</p>
        <form method="POST">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" name="username" class="form-control" placeholder="请输入用户名" required>
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" name="password" class="form-control" placeholder="请输入密码" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block btn-lg">登录</button>
        </form>
        <div class="footer">
            还没有账号？ <a href="{{ url_for('register') }}">立即注册</a>
        </div>
    </div>
</div>
{% endblock %}
